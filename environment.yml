name: dna-distillation
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Python
  - python>=3.8,<3.12

  # Core scientific computing
  - numpy>=1.20.0,<2.0
  - scipy>=1.10.0
  - pandas>=1.5.0

  # DNA/Genomics specific
  - biopython>=1.80
  - pysam>=0.20.0
  - pyfaidx>=0.8.0

  # Machine learning and AI
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - transformers>=4.30.0
  - datasets>=2.10.0
  - tokenizers>=0.13.0
  - scikit-learn>=1.0.0

  # Data processing and visualization
  - matplotlib>=3.5.0
  - seaborn>=0.11.0
  - plotly>=5.0.0

  # Utilities
  - tqdm>=4.60.0
  - rich>=12.0.0
  - click>=8.0.0
  - pyyaml>=6.0
  - requests>=2.25.0

  # Experiment tracking
  - wandb>=0.15.0

  # Development tools
  - pytest>=8.4.1
  - pytest-cov>=4.0.0
  - ruff>=0.11.0
  - black>=23.0,<25.0
  - isort>=5.12,<5.14
  - mypy>=1.0,<2.0

  # Documentation
  - sphinx>=6.0,<9.0
  - furo==2024.8.6
  - myst-parser>=1.0
  - sphinx-copybutton
  - sphinx-autobuild
  - sphinx-autodoc-typehints==1.23.3

  # Packaging
  - twine>=1.11.0
  - build
  - setuptools
  - wheel
  - packaging

  # Pip dependencies (not available in conda)
  - pip
  - pip:
      - pyfaidx>=0.8.0
      - spliceai>=1.3.0

